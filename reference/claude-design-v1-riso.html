document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

olor:var(--ink-soft);letter-spacing:.1em\"><span>✳ DISHCOVER<\u002Fspan><span>PG. 04<\u002Fspan><\u002Fdiv>\n      <\u002Fsection>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;grain&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:10,&quot;min&quot;:0,&quot;max&quot;:30,&quot;step&quot;:2,&quot;unit&quot;:&quot;%&quot;,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Riso&quot;}}\">\nclass Component extends DCLogic {\n  state = { servings:2, tab:'ingredients', done:{}, pantry:['Olive oil','Salt','Garlic','Soy sauce','Rice'], newIng:'', favs:{2:true,4:true}, guests:2, timePref:'BALANCED', cuisine:'ASIAN', method:'TYPE', allowOther:false, macroOn:true, macros:{protein:40,carbs:55,fat:22}, cookTab:'ALL' };\n\n  ring(macros, inks){\n    const C=2*Math.PI*50; const gap=0;\n    const cals={protein:macros.protein*4,carbs:macros.carbs*4,fat:macros.fat*9};\n    const total=cals.protein+cals.carbs+cals.fat||1; let cum=0;\n    return [['protein',inks.tomato],['carbs',inks.ochre],['fat',inks.brick]].map(([k,stroke])=>{\n      const frac=cals[k]/total; const len=Math.max(0,frac*C-gap);\n      const seg={stroke,dasharray:len.toFixed(1)+' '+C.toFixed(1),dashoffset:(-cum*C).toFixed(1)}; cum+=frac; return seg;\n    });\n  }\n\n  renderVals(){\n    const s=this.state;\n    const inks={ink:'#2E2620',inkSoft:'#5A4E44',paper:'#FAF3E3',tomato:'#10B5A0',ochre:'#F5B417',brick:'#77AB4C',pop:'#4E74B8',coral:'#B85F87'};\n    const grainOpacity=(this.props.grain??10)/100;\n\n    // ink ramps for spec\n    const RAMPS={\n      Teal:['#E1FAF4','#B3F1E6','#77E4D2','#38CDB8','#10B5A0','#0C9788','#0A756A','#0A544C','#083530'],\n      Mustard:['#FEF5D3','#FCE59A','#FAD152','#F7BF22','#F5B417','#D6970C','#AA7509','#7C5408','#4C3405'],\n      Moss:['#EEF7DF','#D6EDB4','#B4E080','#8FCB52','#77AB4C','#5F8B3B','#48692C','#33491E','#1F2E13'],\n      Blueberry:['#E9EFF8','#CBD9EE','#9FBBDE','#7099CC','#4E74B8','#3D5C98','#2F4877','#213353','#141E32'],\n      Plum:['#F6E7EE','#EBC9DA','#DBA3BE','#C77CA0','#B65F88','#A24A72','#85395C','#652B45','#2C121D']\n    };\n    const ramps=Object.entries(RAMPS).map(([name,stops])=>({name, stops:stops.map(hex=>({style:{flex:1,height:'26px',background:hex}}))}));\n\n    // type scale\n    const typeScale=[\n      {tag:'DISPLAY / 40', sample:'Stir-Fry', style:{fontFamily:'Bricolage Grotesque',fontWeight:800,fontSize:'40px',color:inks.ink,lineHeight:'1',letterSpacing:'-1px'}},\n      {tag:'H1 / 33', sample:'The pantry', style:{fontFamily:'Bricolage Grotesque',fontWeight:800,fontSize:'33px',color:inks.ink,lineHeight:'1'}},\n      {tag:'H2 / 26', sample:'Made for you', style:{fontFamily:'Bricolage Grotesque',fontWeight:700,fontSize:'26px',color:inks.ink}},\n      {tag:'BODY / 16 · mono', sample:'Tender chicken, fresh spinach.', style:{fontFamily:'Courier Prime',fontSize:'16px',color:inks.inkSoft}},\n      {tag:'MICRO / 11 · mono', sample:'SERVES 2 · 400 KCAL', style:{fontFamily:'Courier Prime',fontSize:'11px',letterSpacing:'.12em',color:inks.inkSoft}},\n      {tag:'HAND / accent', sample:\"don't crowd the pan!\", style:{fontFamily:'Caveat',fontSize:'22px',color:inks.tomato}}\n    ];\n\n    const spacing=[4,8,12,16,24,32,48,64].map(px=>({px, style:{width:'20px',height:px+'px',background:inks.tomato,border:'1.5px solid '+inks.ink}}));\n\n    // coupons\n    const coupons=[{big:\"30'\",label:'TIME',color:inks.ink},{big:'400',label:'KCAL',color:inks.tomato},{big:'EASY',label:'LEVEL',color:inks.ink}];\n\n    // macro donut (actual vs target)\n    const actual={protein:42,carbs:18,fat:16}, target={protein:40,carbs:30,fat:20};\n    const ring=this.ring(actual, inks);\n    const mcolor={protein:inks.tomato,carbs:inks.ochre,fat:inks.brick};\n    const macros=[['PROTEIN','protein'],['CARBS','carbs'],['FAT','fat']].map(([label,k])=>({label,color:mcolor[k],grams:actual[k]+'g',target:'/ '+target[k]+'g'}));\n\n    // ingredients\n    const scale=s.servings/2;\n    const fmt=q=>{const r=Math.round(q*10)/10;return Number.isInteger(r)?(''+r):r.toFixed(1);};\n    const base=[['Chicken breast',300,'g'],['Spinach',200,'g'],['Carrots',100,'g'],['Bell pepper',150,'g'],['Olive oil',2,'tbsp'],['Garlic',4,'clove'],['Soy sauce',2,'tbsp'],['Salt',1,'tsp'],['Pepper',1,'tsp']];\n    const ingredients=base.map(([n,q,u])=>({name:n,q:fmt(q*scale)+' '+u}));\n\n    // steps\n    const stepData=[[1,'Prep the ingredients','Wash and dry the spinach. Peel and thinly slice the carrots, then slice the pepper.','',''],[2,'Season the chicken','Pat dry, cut into bite-sized pieces, season with salt and pepper.','',''],[3,'Heat the pan','Large skillet over medium-high heat, add the olive oil.','',''],[4,'Cook the chicken','Add chicken; cook until golden and cooked through.',\"6'\",\"don't crowd the pan!\"],[5,'Garlic & veg','Sauté garlic 30s, then add the sliced vegetables.','',''],[6,'Stir-fry','Cook until the vegetables start to soften.',\"4'\",''],[7,'Spinach & soy','Add spinach with soy sauce; stir until wilted.',\"2'\",''],[8,'Serve','Plate up and enjoy while hot.','','']];\n    const total=stepData.length;\n    const steps=stepData.map(([n,title,body,time,note],idx)=>{const done=!!s.done[n];return {n,title,body,time,note,done,notDone:!done,hasTime:!!time,\n      onToggle:()=>this.setState(st=>({done:{...st.done,[n]:!st.done[n]}})),\n      numStyle:{width:'34px',height:'34px',flex:'none',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'Bricolage Grotesque',fontWeight:800,fontSize:'15px',background:done?inks.tomato:'transparent',color:done?inks.paper:inks.ink,border:'2.5px solid '+inks.ink,transform:'rotate('+(idx%2?2:-2)+'deg)'},\n      spineStyle:{width:'2px',flex:1,minHeight:'12px',marginTop:'3px',backgroundImage:idx===total-1?'none':'repeating-linear-gradient(var(--ink) 0 4px, transparent 4px 8px)'},\n      titleStyle:{fontFamily:'Bricolage Grotesque',fontWeight:700,fontSize:'17px',textDecoration:done?'line-through':'none',color:done?inks.inkSoft:inks.ink}\n    };});\n    const doneCount=steps.filter(x=>x.done).length;\n\n    const tab=(a)=>({border:'2px solid '+inks.ink,cursor:'pointer',fontFamily:'Courier Prime',fontWeight:700,fontSize:'11.5px',letterSpacing:'.06em',padding:'9px 12px',background:a?inks.tomato:'transparent',color:a?inks.paper:inks.ink,borderBottom:'none',transform:a?'translateY(1px)':'none'});\n\n    // ---- Phase 2 screens ----\n    const chipStyle=(a)=>({display:'inline-flex',alignItems:'center',gap:'6px',cursor:'pointer',border:'1.5px '+(a?'solid':'dashed')+' '+inks.ink,background:a?inks.coral:'transparent',color:a?inks.paper:inks.ink,fontFamily:'Courier Prime',fontWeight:700,fontSize:'12px',letterSpacing:'.04em',padding:'8px 12px'});\n    const segStyle=(a)=>({flex:'1',textAlign:'center',cursor:'pointer',border:'2px solid '+inks.ink,background:a?inks.coral:'transparent',color:a?inks.paper:inks.ink,fontFamily:'Courier Prime',fontWeight:700,fontSize:'11px',letterSpacing:'.04em',padding:'9px 4px'});\n    const sw=(on)=>({track:{width:'48px',height:'26px',border:'2px solid '+inks.ink,background:on?inks.coral:inks.paper,display:'flex',alignItems:'center',padding:'2px',cursor:'pointer',justifyContent:on?'flex-end':'flex-start',flex:'none'},knob:{width:'18px',height:'18px',background:inks.ink}});\n    const RC=[{id:1,title:'CHICKEN & SPINACH STIR-FRY',kcal:'400',time:\"30'\",tag:'FRESH',dish:'#dish1'},{id:2,title:'MISO SALMON & SPROUTS',kcal:'520',time:\"35'\",tag:'PESCATARIAN',dish:'#dish2'},{id:3,title:'SESAME CHICKEN & GREENS',kcal:'380',time:\"25'\",tag:'QUICK',dish:'#dish3'},{id:4,title:'TRUFFLE FRIES & STEAK',kcal:'640',time:\"40'\",tag:'HEARTY',dish:'#dish4'}];\n    const recipes=RC.map(r=>({...r, heartFill:s.favs[r.id]?inks.coral:'none', heartStroke:s.favs[r.id]?inks.coral:inks.ink, onFav:()=>this.setState(st=>({favs:{...st.favs,[r.id]:!st.favs[r.id]}}))}));\n    const featured=recipes[1]; const recipesPair=[recipes[0],recipes[2]];\n    const pantryL=s.pantry.map(name=>({name, onRemove:()=>this.setState(st=>({pantry:st.pantry.filter(x=>x!==name)}))}));\n    const sugAll=['Olive oil','Salt','Pepper','Butter','Garlic','Onions','Flour','Eggs','Milk','Rice','Pasta','Soy sauce','Lemon','Tomato paste'];\n    const suggestions=sugAll.filter(x=>!s.pantry.includes(x)).map(name=>({name, onAdd:()=>this.setState(st=>({pantry:st.pantry.includes(name)?st.pantry:[...st.pantry,name]}))}));\n    const cookTabs=['ALL','FAVORITES','QUICK'].map(name=>({name, style:segStyle(s.cookTab===name), onClick:()=>this.setState({cookTab:name})}));\n    const timeOpts=['FAST','BALANCED','SLOW'].map(name=>({name, style:segStyle(s.timePref===name), onClick:()=>this.setState({timePref:name})}));\n    const cuisines=['ANY','ASIAN','ITALIAN','MEDITERRANEAN','LATIN','AMERICAN'].map(name=>({name, style:chipStyle(s.cuisine===name), onClick:()=>this.setState({cuisine:name})}));\n    const methods=[['TYPE','\\u270E'],['DICTATE','\\u25C9'],['SCAN','\\u25A2']].map(([name,icon])=>({name,icon, style:segStyle(s.method===name), onClick:()=>this.setState({method:name})}));\n    const bRing=this.ring(s.macros, inks);\n    const bKcal=Math.round(s.macros.protein*4+s.macros.carbs*4+s.macros.fat*9);\n    const macroRows=[['protein','PROTEIN'],['carbs','CARBS'],['fat','FAT']].map(([k,label])=>({label,color:mcolor[k],value:s.macros[k]+' g',onMinus:()=>this.setState(st=>({macros:{...st.macros,[k]:Math.max(0,st.macros[k]-5)}})),onPlus:()=>this.setState(st=>({macros:{...st.macros,[k]:st.macros[k]+5}}))}));\n    const allowSwitch=sw(s.allowOther), macroSwitch=sw(s.macroOn);\n    const macroBodyStyle={opacity:s.macroOn?1:.4,pointerEvents:s.macroOn?'auto':'none'};\n\n    return {\n      grainOpacity, ramps, typeScale, spacing, coupons, ring, macros,\n      recipes, featured, recipesPair, pantryL, suggestions, pantryCount:s.pantry.length,\n      newIng:s.newIng, onNewIng:(e)=>this.setState({newIng:e.target.value}),\n      onIngKey:(e)=>{ if(e.key==='Enter'){ const v=s.newIng.trim(); if(v) this.setState(st=>({pantry:st.pantry.includes(v)?st.pantry:[...st.pantry,v],newIng:''})); } },\n      addTyped:()=>{ const v=s.newIng.trim(); if(v) this.setState(st=>({pantry:st.pantry.includes(v)?st.pantry:[...st.pantry,v],newIng:''})); },\n      cookTabs, timeOpts, cuisines, methods, guests:s.guests,\n      onGuestsMinus:()=>this.setState(st=>({guests:Math.max(1,st.guests-1)})), onGuestsPlus:()=>this.setState(st=>({guests:Math.min(12,st.guests+1)})),\n      bRing, bKcal, macroRows, allowSwitch, macroSwitch, macroBodyStyle,\n      toggleAllow:()=>this.setState(st=>({allowOther:!st.allowOther})), toggleMacro:()=>this.setState(st=>({macroOn:!st.macroOn})),\n      ingredients, servings:s.servings,\n      onServMinus:()=>this.setState(st=>({servings:Math.max(1,st.servings-1)})), onServPlus:()=>this.setState(st=>({servings:Math.min(12,st.servings+1)})),\n      steps, doneLabel:doneCount+' OF '+total+' STEPS DONE',\n      ingCount:ingredients.length, stepCount:total,\n      showIngredients:s.tab==='ingredients', showSteps:s.tab==='steps',\n      onTabIng:()=>this.setState({tab:'ingredients'}), onTabSteps:()=>this.setState({tab:'steps'}),\n      tabIngStyle:tab(s.tab==='ingredients'), tabStepStyle:tab(s.tab==='steps')\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
